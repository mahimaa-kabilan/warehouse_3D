<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Warehouse Twin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Floating Dashboard HUD -->
    <div id="ui">
        <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            Add Packages
        </h2>
        
        <input type="number" id="quantity" min="1" max="60" placeholder="Number of Packages (e.g. 5)">
        <button id="generateInputs">Generate Inputs</button>

        <div id="packageInputs"></div>

        <button id="addBtn" style="display: none;">Add Packages to DB</button>

        <hr>

        <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Search Package
        </h2>
        <input type="text" id="searchInput" placeholder="Enter Package ID">
        <button id="searchBtn">Locate & Highlight</button>

        <hr>

        <h2>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"></line><polyline points="14 6 20 12 14 18"></polyline></svg>
            Dispatch Package
        </h2>
        <input type="text" id="dispatchInput" placeholder="Enter Package ID to Dispatch">
        <button id="dispatchBtn">Dispatch & Refill</button>
    </div>

    <!-- Floating Selection Details Card -->
    <div id="details">
        <div class="details-title">Package Details</div>
        <div class="details-empty">Click a package in the 3D grid or search for one to inspect its properties.</div>
    </div>

    <!-- Background 3D Canvas -->
    <canvas id="bg"></canvas>

    <!-- UI Feedback Toast -->
    <div id="toast" style="display: none;"></div>

    <!-- Library Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="app.js"></script>
</body>

</html>
